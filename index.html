<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>随机文档</title>
    <!-- 下面三行是关键：禁止浏览器缓存 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; background: #f4f4f4; box-sizing: border-box; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        #randomText { font-size: 1.2em; color: #333; margin-bottom: 20px; line-height: 1.6; word-break: break-word; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>
    <div class="container">
        <p id="randomText">加载中...</p>
        <button onclick="showRandomText()">换一条</button>
    </div>

    <script>
        // 👇 把你准备好的100条文档内容替换进这个数组
        const texts = [
            "这是第一条文档的完整内容。",
            "这是第二条文档的完整内容。",
            "这是第三条文档的完整内容。"
            // ... 共100条
        ];

        function showRandomText() {
            const randomIndex = Math.floor(Math.random() * texts.length);
            document.getElementById('randomText').textContent = texts[randomIndex];
        }

        // 页面加载时，立即显示一条随机文档
        window.onload = showRandomText;
    </script>
</body>
</html>
